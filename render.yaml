services:
  - type: web
    name: qr-link-bridge
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: METERED_API_KEY
        sync: false
      - key: METERED_DOMAIN
        value: qrslb.metered.live
      - key: ALLOWED_ORIGIN
        sync: https://qrslb.onrender.com