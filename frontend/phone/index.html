<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Send Link</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #222222;
    --accent:   #c8f135;
    --text:     #f0f0f0;
    --muted:    #555555;
    --danger:   #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100dvh;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* accent glow */
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, #c8f13518 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── card ── */
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    animation: fadeUp 0.45s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--accent);
    border-style: solid;
  }
  .card::before { top: -1px;    left: -1px;  border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ── header ── */
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  h1 span { color: var(--accent); }

  /* ── input ── */
  .input-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  textarea {
    width: 100%;
    min-height: 90px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  textarea::placeholder { color: var(--muted); }

  textarea:focus { border-color: var(--accent); }

  /* ── send button ── */
  .send-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .send-btn:active { transform: scale(0.98); opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ── status ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connecting { background: #4fc3f7; animation: pulse 1.4s infinite; }
  .dot.ready      { background: var(--accent); animation: pulse 1.4s infinite; }
  .dot.sending    { background: var(--accent); animation: pulse 0.6s infinite; }
  .dot.done       { background: var(--accent); animation: none; }
  .dot.error      { background: var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    transition: color 0.3s;
  }
  .status-text.active { color: var(--text); }

  /* ── success view ── */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
    animation: fadeUp 0.4s ease both;
  }
  .success.show { display: flex; }

  .checkmark {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  .success h2 { font-size: 20px; font-weight: 800; }
  .success p  {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── error view ── */
  .error-view {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }
  .error-view.show { display: flex; }

  .error-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--danger);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--danger);
  }

  .error-view h2 { font-size: 18px; font-weight: 800; }
  .error-view p  {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="card">

  <!-- ── main send view ── -->
  <div id="main-view" style="display:flex;flex-direction:column;gap:28px">

    <div>
      <div class="logo">QR Link Bridge</div>
      <h1>Send a link to<br><span>that screen</span></h1>
    </div>

    <div class="status-bar">
      <div class="dot connecting" id="dot"></div>
      <div class="status-text active" id="status-text">Connecting…</div>
    </div>

    <div class="input-wrap">
      <label>Paste your link</label>
      <textarea
        id="link-input"
        placeholder="https://drive.google.com/…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        disabled
      ></textarea>
    </div>

    <button class="send-btn" id="send-btn" disabled onclick="sendLink()">
      Send to desktop →
    </button>

  </div>

  <!-- ── success view ── -->
  <div class="success" id="success-view">
    <div class="checkmark">✓</div>
    <h2>Link sent!</h2>
    <p>The desktop opened your link.<br>You can close this tab.</p>
  </div>

  <!-- ── error view ── -->
  <div class="error-view" id="error-view">
    <div class="error-icon">✕</div>
    <h2 id="error-title">Something went wrong</h2>
    <p id="error-desc">Please go back and scan the QR again.</p>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────────────────────

const BASE_URL   = window.location.origin;
const WS_BASE    = BASE_URL.replace(/^http/, 'ws');
let ICE_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// ─────────────────────────────────────────────────────────────────────────────
// Read session ID from URL  ?session=abc12345
// ─────────────────────────────────────────────────────────────────────────────

const sessionId = new URLSearchParams(window.location.search).get('session');

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────

let ws = null;
let pc = null;
let dc = null;   // DataChannel (received from desktop)

// ─────────────────────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────────────────────

function setStatus(text, state = '') {
  const dot   = document.getElementById('dot');
  const label = document.getElementById('status-text');
  dot.className   = 'dot ' + state;
  label.className = 'status-text' + (state ? ' active' : '');
  label.textContent = text;
}

function enableInput() {
  document.getElementById('link-input').disabled = false;
  document.getElementById('link-input').focus();
  document.getElementById('send-btn').disabled   = false;
}

function showSuccess() {
  document.getElementById('main-view').style.display  = 'none';
  document.getElementById('success-view').classList.add('show');
}

function showError(title, desc) {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('error-view').classList.add('show');
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-desc').textContent  = desc;
}

// ─────────────────────────────────────────────────────────────────────────────
// Send link through DataChannel
// ─────────────────────────────────────────────────────────────────────────────

function sendLink() {
  const raw = document.getElementById('link-input').value.trim();

  // Validate URL
  if (!/^https?:\/\//i.test(raw)) {
    setStatus('URL must start with http:// or https://', 'error');
    return;
  }

  if (!dc || dc.readyState !== 'open') {
    setStatus('Not connected — please retry', 'error');
    return;
  }

  setStatus('Sending…', 'sending');
  document.getElementById('send-btn').disabled = true;

  dc.send(JSON.stringify({ type: 'link', url: raw }));

  // Wait for ack from desktop (handled in dc.onmessage)
}

// ─────────────────────────────────────────────────────────────────────────────
// WebRTC — phone is the ANSWER side
// ─────────────────────────────────────────────────────────────────────────────

function createPeerConnection() {
  pc = new RTCPeerConnection(ICE_CONFIG);

  // Phone OPENS the DataChannel
  dc = pc.createDataChannel('link');

  dc.onopen = () => {
    setStatus('Ready — paste your link', 'ready');
    enableInput();
  };

  dc.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'ack') showSuccess();
    } catch (_) {}
  };

  dc.onclose = () => {
    if (!document.getElementById('success-view').classList.contains('show')) {
      setStatus('Connection closed', 'error');
    }
  };

  // Relay ICE candidates through signaling server
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) wsSend({ type: 'ice', candidate: candidate.toJSON() });
  };
}

async function startOffer() {
  createPeerConnection();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  wsSend({ type: 'offer', sdp: { type: offer.type, sdp: offer.sdp } });
}

async function handleAnswer(sdp) {
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
}

async function handleIce(candidate) {
  try {
    if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
  } catch (_) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// WebSocket signaling
// ─────────────────────────────────────────────────────────────────────────────

function wsSend(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(payload));
  }
}

function connectWS() {
  ws = new WebSocket(`${WS_BASE}/ws/${sessionId}/phone`);

  ws.onopen = () => {
    setStatus('Waiting for desktop…', 'connecting');
    // Tell server this side's message loop is live.
    // Server will fire peer_joined once both sides have sent ready.
    wsSend({ type: 'ready' });
  };

  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);

    switch (msg.type) {
      case 'connected':
        setStatus('Waiting for desktop…', 'connecting');
        break;
      case 'peer_joined':
        // Both sides ready — phone creates offer
        setStatus('Establishing connection…', 'connecting');
        await startOffer();
        break;
      case 'answer':
        // Desktop answered — complete handshake
        await handleAnswer(msg.sdp);
        break;
      case 'ice':
        await handleIce(msg.candidate);
        break;
      case 'done':
        ws.close();
        break;
      case 'peer_left':
        showError('Desktop disconnected', 'The desktop page was closed. Please scan the QR again.');
        break;
      case 'error':
        showError('Error', msg.message);
        break;
    }
  };

  ws.onerror = () => {
    showError('Connection failed', 'Could not reach the server. Please try again.');
  };

  ws.onclose = () => {
    if (!document.getElementById('success-view').classList.contains('show')) {
      // Only show if not already success
    }
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────

async function init() {
  // No session ID in URL
  if (!sessionId) {
    showError('No session found', 'Scan the QR code on the desktop to get started.');
    return;
  }

  // Validate session is still alive
  try {
    const res  = await fetch(`/session/${sessionId}`);
    const data = await res.json();

    if (!data.valid) {
      showError('Session expired', 'This QR code is no longer valid. Ask for a new one.');
      return;
    }
  } catch (_) {
    showError('Server unreachable', 'Could not connect to the server. Please try again.');
    return;
  }

  // Fetch ICE config (includes TURN if configured on server)
  try {
    const iceRes = await fetch('/ice-config');
    ICE_CONFIG = await iceRes.json();
  } catch (_) { /* fallback to default STUN */ }

  // All good — connect
  connectWS();
}

init();
</script>
</body>
</html>
